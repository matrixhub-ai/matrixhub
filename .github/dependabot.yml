version: 2
updates:

  # Maintain dependencies for go in root
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "automated"
    open-pull-requests-limit: 5
    groups:
      all:
        applies-to: "version-updates"
        update-types:
          - "minor"
          - "patch"

  # Maintain npm dependencies for ui
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "automated"
    open-pull-requests-limit: 5
    groups:
      mantine:
        patterns:
          - "@mantine/*"
          - "mantine-react-table"
        update-types: [minor, patch]
      tanstack:
        patterns:
          - "@tanstack/*"
        update-types: [minor, patch]
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vite-*"
          - "rollup"
        update-types: [minor, patch]
      lint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "typescript-eslint"
        update-types: [minor, patch]

  # Maintain npm dependencies for website
  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "automated"
    open-pull-requests-limit: 5
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
        update-types: [minor, patch]

  # Maintain GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "automated"
    open-pull-requests-limit: 5
    groups:
      all:
        applies-to: "version-updates"
        update-types:
          - "minor"
          - "patch"

  # Maintain Dockerfile
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "automated"
    open-pull-requests-limit: 3
