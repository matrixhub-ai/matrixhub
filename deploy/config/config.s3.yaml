# config for local dev env
debug: true
migrationPath: /etc/matrixhub/migrations
log:
  level: debug
database:
  # dsn: "matrixhub:changeme@tcp(127.0.0.1:30007)/matrixhub?charset=utf8mb4&multiStatements=true&parseTime=true"
  driver: mysql
  accessType: readwrite
  maxOpenConns: 100
  maxIdleConns: 10
  connMaxLifetimeSeconds: 3600
  connMaxIdleSeconds: 1800
  migrate: true

apiServer:
  port: 3001
  # S3 storage configuration (optional)
  storage:
    mode: s3
    s3:
      endpoint: http://s3:9000
      bucket: matrixhub
      region: us-east-1
      accessKey: adminadmin
      secretKey: adminadmin
      usePathStyle: true
      signEndpoint: http://127.0.0.1:9000
      repositories: true

jobServer:
  enabled: true
  shutdownGrace: 30s
  syncPolicy:
    pollInterval: 30s
    maxConcurrent: 5
    taskMaxDuration: 2h
  syncTask:
    pollInterval: 30s
    maxConcurrent: 5
    taskMaxDuration: 2h
  syncJob:
    pollInterval: 30s
    maxConcurrent: 5
    taskMaxDuration: 2h
  logDir: ""

ui:
  staticDir: /app
